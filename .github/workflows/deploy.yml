name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t watch-sender .

      - name: Restart service
        run: docker compose -f $HOME/watch-infra/docker-compose.yml up -d --no-deps watch-sender
